<div class="grid grid-rows-3 gap-1">
  <span class="text-center">{{ include.date }}</span>
  <a href="{{ include.venue_url }}" class="text-xl font-bold text-center text-yellow-600 hover:underline">{{ include.venue_name }}</a>
  <div class="flex items-center justify-center space-x-2">
    <a href="{{ include.google_url }}" class="flex items-center justify-center space-x-2 text-gray-800 hover:underline" target="_blank" rel="noopener noreferrer">
      <span>{{ include.venue_city }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
      </svg>
    </a>
  </div>
</div>
<hr />
