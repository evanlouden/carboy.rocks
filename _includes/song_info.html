<div class="border rounded-xl p-4 shadow-sm bg-white">

  <!-- Title + Key -->
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold">
      {{ include.title }}
    </h2>

    <span class="text-sm font-medium text-gray-700 bg-gray-100 px-3 py-1 rounded-full">
      {{ include.song_key }}
    </span>
  </div>

  <!-- Buttons -->
  <div class="grid grid-cols-2 gap-3">
    <a href="{{ include.recording_url }}" target="_blank"
      class="col-span-2 text-center px-4 py-3 rounded-lg border border-gray-500 border-3 bg-emerald-400 text-black hover:bg-gray-100 transition">
      Recording
    </a>
    <a href="{{ include.lead_sheet }}" target="_blank"
      class="text-center px-4 py-3 rounded-lg border border-gray-500 border-3 bg-amber-200 text-black hover:bg-gray-100 transition">
      Lead Sheet
    </a>
    <a href="{{ include.b_flat_chart }}" target="_blank"
      class="text-center px-4 py-3 rounded-lg border border-gray-500 border-3 bg-amber-200 text-black hover:bg-gray-100 transition">
      B♭ Chart
    </a>
    <a href="{{ include.e_flat_chart }}" target="_blank"
      class="text-center px-4 py-3 rounded-lg border border-gray-500 border-3 bg-amber-200 text-black hover:bg-gray-100 transition">
      E♭ Chart
    </a>
    <a href="{{ include.bass_clef_chart }}" target="_blank"
      class="text-center px-4 py-3 rounded-lg border border-gray-500 border-3 bg-amber-200 text-black hover:bg-gray-100 transition">
      Bass Clef
    </a>
  </div>
</div>
